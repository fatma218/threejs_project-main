<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, user-scalable=no"
    />
    <title>🌅 Morning Tale</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;500&family=DM+Sans:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="loading">
      <div class="loading-inner">
        <p class="loading-title">Morning Tale</p>
        <p style="opacity: 0.5; font-size: 12px; letter-spacing: 2px">
          CHARGEMENT DE L'HISTOIRE...
        </p>
      </div>
    </div>

    <div id="storyUI">
      <div id="progressBar"><div id="progressFill"></div></div>
      <div id="stepCounter">0 / 9</div>

      <div id="subtitle">
        <div id="storyEmoji">🌙</div>
        <div id="storyTitle">Bonne nuit…</div>
        <div id="storySub">La chambre est calme, la nuit est douce…</div>
      </div>

      <button id="nextBtn" disabled>Suivant ▶</button>
    </div>

    <div
      style="
        position: fixed;
        top: 20px;
        right: 20px;
        display: flex;
        gap: 10px;
        z-index: 100;
      "
    >
      <button class="secondary-btn" id="freeCamBtn">🎬 Caméra libre</button>
      <button class="secondary-btn" id="designModeBtn">🎨 Mode Design</button>
    </div>

    <div
      style="
        position: fixed;
        top: 20px;
        left: 20px;
        display: flex;
        gap: 10px;
        z-index: 100;
      "
    >
      <button class="xr-btn" id="arBtn">📱 AR</button>
      <button class="xr-btn" id="vrBtn">🥽 VR</button>
    </div>

    <div id="finalScreen" style="display: none">
      <div id="finalText">✨ Good Morning!</div>
      <button id="restartBtn" onclick="location.reload()"></button>
    </div>

    <div id="blackout"></div>

    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
      }
    </script>
    <script type="module" src="js/app.js"></script>
  </body>
</html>
