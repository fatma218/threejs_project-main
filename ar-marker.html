<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Morning Tale — AR</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #000; font-family: 'DM Sans', sans-serif; }

    /* Écran de démarrage */
    #start-screen {
      position: fixed;
      inset: 0;
      background: #070510;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 28px;
      z-index: 999;
    }
    #start-screen h1 {
      font-size: 28px;
      color: #ffd080;
      letter-spacing: 4px;
      text-transform: uppercase;
    }
    #start-screen p {
      color: rgba(255,255,255,0.6);
      font-size: 14px;
      text-align: center;
      max-width: 280px;
      line-height: 1.6;
    }
    #start-screen img {
      width: 120px;
      border: 2px solid #ffd080;
      border-radius: 10px;
    }
    #start-btn {
      background: linear-gradient(135deg, rgba(255,208,128,0.2), rgba(255,208,128,0.1));
      border: 1px solid #ffd080;
      color: #ffd080;
      padding: 16px 40px;
      border-radius: 40px;
      font-size: 17px;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      letter-spacing: 1px;
    }

    /* Vidéo caméra AR.js */
    #arjs-video, video {
      position: fixed !important;
      top: 0 !important;
      left: 0 !important;
      width: 100% !important;
      height: 100% !important;
      object-fit: cover !important;
      z-index: 0 !important;
    }

    #info {
      position: fixed;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(10,8,24,0.88);
      border: 1px solid rgba(255,208,128,0.4);
      border-radius: 14px;
      padding: 10px 18px;
      color: #ffd080;
      font-size: 13px;
      text-align: center;
      z-index: 200;
      max-width: 88vw;
      line-height: 1.5;
      pointer-events: none;
    }

    #back-btn {
      position: fixed;
      top: 16px;
      left: 16px;
      background: rgba(10,8,24,0.85);
      border: 1px solid rgba(255,255,255,0.25);
      color: #fff;
      padding: 10px 16px;
      border-radius: 30px;
      font-size: 14px;
      cursor: pointer;
      z-index: 200;
      font-family: 'DM Sans', sans-serif;
    }

    /* Marqueur de référence affiché en coin */
    #marker-panel {
      position: fixed;
      bottom: 110px;
      right: 14px;
      z-index: 200;
      text-align: center;
    }
    #marker-panel img {
      width: 88px;
      border: 2px solid #ffd080;
      border-radius: 8px;
      display: block;
    }
    #marker-panel p {
      color: #ffd080;
      font-size: 10px;
      margin-top: 4px;
      letter-spacing: 0.5px;
    }

    /* Boutons de contrôle */
    #controls {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 10px;
      z-index: 200;
    }
    .ctrl-btn {
      background: rgba(10,8,24,0.85);
      border: 1px solid rgba(255,208,128,0.45);
      color: #ffd080;
      padding: 12px 18px;
      border-radius: 30px;
      font-size: 18px;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }
    .ctrl-btn:active {
      background: rgba(255,208,128,0.2);
    }
    #label-size {
      color: rgba(255,208,128,0.7);
      font-size: 11px;
      text-align: center;
      margin-top: 6px;
      letter-spacing: 0.5px;
    }

    /* Indicateur "marqueur non détecté" */
    #no-marker {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      z-index: 190;
    }
    #no-marker div {
      background: rgba(10,8,24,0.7);
      border: 1px dashed rgba(255,208,128,0.4);
      border-radius: 18px;
      padding: 20px 28px;
      color: rgba(255,208,128,0.75);
      font-size: 14px;
      text-align: center;
      line-height: 1.6;
      backdrop-filter: blur(8px);
    }
  </style>
</head>
<body>

  <!-- Écran de démarrage -->
  <div id="start-screen">
    <h1>Morning Tale</h1>
    <img src="https://ar-js-org.github.io/AR.js/data/images/hiro.png" alt="Marqueur Hiro">
    <p>Imprime ou affiche cette image sur un autre écran, puis pointe ta caméra dessus.</p>
    <button id="start-btn" onclick="startAR()">📷 Ouvrir la caméra</button>
    <button style="background:none;border:none;color:rgba(255,255,255,0.4);font-size:13px;cursor:pointer;font-family:inherit;" onclick="window.location.href='index.html'">← Retour</button>
  </div>

  <div id="info" style="display:none">📷 Pointez vers le marqueur Hiro → la chambre apparaît ✨</div>
  <button id="back-btn" onclick="window.location.href='index.html'" style="display:none">← Retour</button>

  <div id="marker-panel" style="display:none">
    <img src="https://ar-js-org.github.io/AR.js/data/images/hiro.png" alt="Marqueur Hiro">
    <p>MARQUEUR HIRO</p>
  </div>

  <div id="controls" style="display:none">
    <button class="ctrl-btn" id="btnSmaller" title="Réduire">➖</button>
    <button class="ctrl-btn" id="btnRotate"  title="Pivoter">🔄</button>
    <button class="ctrl-btn" id="btnBigger"  title="Agrandir">➕</button>
  </div>

  <div id="no-marker">
    <div>🔍 Cherche le marqueur…<br>Pointe vers l'image à droite</div>
  </div>

  <!-- Three.js + AR.js via CDN (pas de modules ES requis) -->
  <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/three.js/build/ar-threejs.min.js"></script>

  <script>
    function startAR() {
      // Cacher l'écran de démarrage, afficher l'UI AR
      document.getElementById('start-screen').style.display = 'none';
      document.getElementById('info').style.display = 'block';
      document.getElementById('back-btn').style.display = 'block';
      document.getElementById('marker-panel').style.display = 'block';
      document.getElementById('controls').style.display = 'flex';
      initARScene();
    }

    function initARScene() {

    // ── Renderer ───────────────────────────────────────────────────
    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    renderer.domElement.style.cssText = 'position:fixed;top:0;left:0;z-index:1';
    document.body.appendChild(renderer.domElement);

    // ── Scene + Camera ─────────────────────────────────────────────
    const scene = new THREE.Scene();
    const camera = new THREE.Camera();
    scene.add(camera);

    // ── Lumières ───────────────────────────────────────────────────
    scene.add(new THREE.AmbientLight(0x8877bb, 2.2));
    const sun = new THREE.DirectionalLight(0xffe8aa, 1.4);
    sun.position.set(2, 5, 3);
    sun.castShadow = true;
    scene.add(sun);
    scene.add(Object.assign(new THREE.DirectionalLight(0x4466bb, 0.5), { position: new THREE.Vector3(-3, 2, -2) }));

    // ── AR.js Source (webcam) ──────────────────────────────────────
    const arSource = new THREEx.ArToolkitSource({ sourceType: 'webcam' });
    arSource.init(() => { setTimeout(onResize, 800); });
    window.addEventListener('resize', onResize);

    function onResize() {
      arSource.onResizeElement();
      arSource.copyElementSizeTo(renderer.domElement);
      if (arContext.arController !== null) {
        arSource.copyElementSizeTo(arContext.arController.canvas);
      }
    }

    // ── AR.js Context ──────────────────────────────────────────────
    const arContext = new THREEx.ArToolkitContext({
      cameraParametersUrl: 'https://raw.githack.com/AR-js-org/AR.js/master/data/data/camera_para.dat',
      detectionMode: 'mono',
    });
    arContext.init(() => {
      camera.projectionMatrix.copy(arContext.getProjectionMatrix());
    });

    // ── Marqueur Hiro ──────────────────────────────────────────────
    const markerRoot = new THREE.Group();
    scene.add(markerRoot);
    new THREEx.ArMarkerControls(arContext, markerRoot, {
      type: 'preset',
      patternUrl: 'hiro',
    });

    // ── Groupe chambre (sur le marqueur) ───────────────────────────
    let roomScale = 0.14;
    let rotStep = 0;
    const roomGroup = new THREE.Group();
    roomGroup.scale.setScalar(roomScale);
    markerRoot.add(roomGroup);
    buildRoom(roomGroup);

    // ── Contrôles ──────────────────────────────────────────────────
    document.getElementById('btnBigger').addEventListener('click', () => {
      roomScale = Math.min(roomScale + 0.02, 0.40);
      roomGroup.scale.setScalar(roomScale);
    });
    document.getElementById('btnSmaller').addEventListener('click', () => {
      roomScale = Math.max(roomScale - 0.02, 0.04);
      roomGroup.scale.setScalar(roomScale);
    });
    document.getElementById('btnRotate').addEventListener('click', () => {
      rotStep += Math.PI / 4;
      roomGroup.rotation.y = rotStep;
    });

    // ── Indicateur marqueur visible / non visible ──────────────────
    const noMarkerEl = document.getElementById('no-marker');
    let lastVisible = false;

    // ── Boucle d'animation ─────────────────────────────────────────
    renderer.setAnimationLoop((time) => {
      if (arSource.ready) {
        arContext.update(arSource.domElement);
        scene.visible = camera.visible;

        // Affiche/cache l'indicateur selon si le marqueur est détecté
        const isVisible = markerRoot.visible;
        if (isVisible !== lastVisible) {
          noMarkerEl.style.display = isVisible ? 'none' : 'flex';
          lastVisible = isVisible;
        }
      }
      renderer.render(scene, camera);
    });

    // ═══════════════════════════════════════════════════════════════
    //  CHAMBRE 3D — version fidèle en boîtes primitives
    // ═══════════════════════════════════════════════════════════════
    function buildRoom(root) {
      const W = 10, H = 3.8, D = 10;

      const M = {
        wall:  mat(0xf2e8d8, 0.9, 0, THREE.BackSide),
        floor: mat(0xd4a96a, 0.7),
        rug:   mat(0xa06050, 1.0),
        bed:   mat(0xc08060, 0.7),
        linen: mat(0xfff0e0, 0.9),
        wood:  mat(0x9e7c5a, 0.6),
        ward:  mat(0x7a5535, 0.6),
        desk:  mat(0x9a7a55, 0.6),
        glass: matGlass(0xaaddff),
        metal: matMetal(0xc8a060),
        plant: mat(0x4a8040, 0.8),
        pot:   mat(0x8b6340, 0.7),
        lamp:  matEmit(0xfff0cc, 0xffcc66, 0.5),
        char:  mat(0xffcc99, 0.6),
        shirt: mat(0x5577aa, 0.8),
        pants: mat(0x334466, 0.8),
        hair:  mat(0x3a2510, 0.8),
      };

      // ── Pièce ────────────────────────────────────────────────────
      box(root, W, 0.05, D, M.floor, 0, -0.025, 0);
      box(root, W, H, D, M.wall,    0, H/2, 0);
      box(root, 5.5, 0.03, 4.5, M.rug, 0, 0.015, 0.5);

      // Plinthes
      box(root, W, 0.1, 0.04, mat(0xefe0cc,0.5), 0, 0.05, -D/2+0.04);
      box(root, W, 0.1, 0.04, mat(0xefe0cc,0.5), 0, 0.05,  D/2-0.04);
      box(root, 0.04, 0.1, D, mat(0xefe0cc,0.5), -W/2+0.04, 0.05, 0);
      box(root, 0.04, 0.1, D, mat(0xefe0cc,0.5),  W/2-0.04, 0.05, 0);

      // ── Lit ──────────────────────────────────────────────────────
      box(root, 2.0, 0.28, 2.2, M.bed,   -2.8, 0.14, -3.5);  // sommier
      box(root, 2.0, 0.22, 2.2, M.linen, -2.8, 0.50, -3.5);  // matelas
      box(root, 1.9, 0.35, 2.1, mat(0xddd0bb,0.9), -2.8, 0.63, -3.5); // couette
      box(root, 2.0, 0.5, 0.14, M.wood,  -2.8, 0.55, -4.55); // tête de lit
      box(root, 1.7, 0.38, 0.14, M.linen, -2.8, 0.64, -4.46); // oreiller

      // ── Table de nuit ─────────────────────────────────────────────
      box(root, 0.6, 0.5, 0.55, M.wood, -1.4, 0.25, -3.2);

      // ── Armoire ───────────────────────────────────────────────────
      box(root, 0.55, 2.2, 1.5, M.ward, -4.2, 1.1, -1.0);
      box(root, 0.04, 2.15, 0.02, mat(0x5a3a1a,0.5), -4.0, 1.07, -0.3); // ligne centrale
      box(root, 0.05, 0.05, 0.05, M.metal, -3.97, 1.1, -0.3); // poignée

      // ── Bureau ────────────────────────────────────────────────────
      box(root, 1.4, 0.06, 0.7, M.desk, 2.8, 0.78, 1.5);
      [[-.6,.28],[.6,.28],[-.6,-.28],[.6,-.28]].forEach(([dx,dz]) =>
        box(root, 0.06, 0.78, 0.06, M.desk, 2.8+dx, 0.39, 1.5+dz));

      // ── Chaise ────────────────────────────────────────────────────
      box(root, 0.5, 0.04, 0.5, M.wood, 2.8, 0.5, 2.8);
      box(root, 0.5, 0.55, 0.05, M.wood, 2.8, 0.77, 3.06);
      [[-.2,.22],[.2,.22],[-.2,-.22],[.2,-.22]].forEach(([dx,dz]) =>
        box(root, 0.05, 0.5, 0.05, M.wood, 2.8+dx, 0.25, 2.8+dz));

      // ── Plante ────────────────────────────────────────────────────
      box(root, 0.35, 0.32, 0.35, M.pot, 3.5, 0.16, 3.5);
      mesh(root, new THREE.SphereGeometry(0.42, 8, 6), M.plant, 3.5, 0.75, 3.5);

      // ── Lampe de sol ──────────────────────────────────────────────
      box(root, 0.07, 1.4, 0.07, mat(0xc8a060,0.4), -3.8, 0.7, 2.8);
      mesh(root, new THREE.CylinderGeometry(0.28, 0.38, 0.45, 12), M.lamp, -3.8, 1.6, 2.8);
      const lp = new THREE.PointLight(0xffaa44, 1.8, 4.5);
      lp.position.set(-3.8, 1.5, 2.8); root.add(lp);

      // ── Lavabo ────────────────────────────────────────────────────
      box(root, 0.9, 0.85, 0.55, mat(0xd8e8f0,0.3), 4.1, 0.42, -1.8);
      box(root, 0.75, 0.06, 0.42, mat(0xffffff,0.2), 4.09, 0.87, -1.8);

      // ── Fenêtre (mur nord) ────────────────────────────────────────
      box(root, 2.2, 0.09, 0.12, M.wood, 1.5, 3.02, -4.98);
      box(root, 2.2, 0.09, 0.12, M.wood, 1.5, 1.03, -4.98);
      box(root, 0.1, 2.05, 0.12, M.wood, 0.45, 2.02, -4.98);
      box(root, 0.1, 2.05, 0.12, M.wood, 2.55, 2.02, -4.98);
      box(root, 0.06, 1.95, 0.06, M.wood, 1.5, 2.02, -4.98);
      box(root, 2.0, 0.06, 0.06, M.wood, 1.5, 2.02, -4.98);
      box(root, 2.0, 1.95, 0.04, M.glass, 1.5, 2.02, -4.98);
      // Rebord fenêtre
      box(root, 2.4, 0.06, 0.22, mat(0xf5ede0,0.5), 1.5, 1.03, -4.88);

      // ── Porte (mur sud) ───────────────────────────────────────────
      box(root, 1.0, 2.1, 0.07, mat(0xb89070,0.65), -1.5, 1.05, 4.97);
      box(root, 0.7, 0.85, 0.04, mat(0xc8a07a,0.6), -1.5, 1.4, 4.95);
      box(root, 0.7, 0.85, 0.04, mat(0xc8a07a,0.6), -1.5, 0.55, 4.95);
      mesh(root, new THREE.SphereGeometry(0.05, 10, 10), M.metal, -1.12, 1.05, 4.93);
      // Cadre porte
      box(root, 1.1, 0.1, 0.14, mat(0x9e7c5a,0.65), -1.5, 2.16, 4.98);
      box(root, 0.1, 2.2, 0.14, mat(0x9e7c5a,0.65), -2.05, 1.05, 4.98);
      box(root, 0.1, 2.2, 0.14, mat(0x9e7c5a,0.65), -0.95, 1.05, 4.98);

      // ── Miroir (mur est) ──────────────────────────────────────────
      const mg = new THREE.Group();
      mg.position.set(4.94, 1.9, -1.0);
      mg.rotation.y = -Math.PI / 2;
      box(mg, 1.1, 1.5, 0.08, M.wood, 0, 0, 0);
      box(mg, 0.98, 1.36, 0.02, mat(0xddeeff,0.01,0.98), 0, 0, 0.045);
      root.add(mg);

      // ── Horloge (table de nuit) ───────────────────────────────────
      mesh(root, new THREE.CylinderGeometry(0.18, 0.18, 0.08, 16), mat(0xeeeecc,0.2), -1.1, 0.54, -3.1);

      // ── Personnage (debout au centre) ─────────────────────────────
      buildCharacter(root, 0, 0, 0.5);
    }

    function buildCharacter(root, x, y, z) {
      const g = new THREE.Group();
      g.position.set(x, y, z);
      root.add(g);

      const M = {
        skin: mat(0xffcc99, 0.5),
        shirt: mat(0x5577cc, 0.7),
        pants: mat(0x334466, 0.7),
        hair: mat(0x3a2510, 0.8),
        shoe: mat(0x222222, 0.8),
      };

      // Jambes
      box(g, 0.16, 0.52, 0.16, M.pants, -0.12, 0.26, 0);
      box(g, 0.16, 0.52, 0.16, M.pants,  0.12, 0.26, 0);
      // Chaussures
      box(g, 0.17, 0.08, 0.22, M.shoe, -0.12, 0.04, 0.03);
      box(g, 0.17, 0.08, 0.22, M.shoe,  0.12, 0.04, 0.03);
      // Corps
      box(g, 0.42, 0.6, 0.24, M.shirt, 0, 0.82, 0);
      // Bras
      box(g, 0.14, 0.48, 0.14, M.shirt, -0.3, 0.82, 0);
      box(g, 0.14, 0.48, 0.14, M.shirt,  0.3, 0.82, 0);
      // Mains
      mesh(g, new THREE.SphereGeometry(0.09, 7, 7), M.skin, -0.3, 0.55, 0);
      mesh(g, new THREE.SphereGeometry(0.09, 7, 7), M.skin,  0.3, 0.55, 0);
      // Cou
      box(g, 0.14, 0.14, 0.14, M.skin, 0, 1.17, 0);
      // Tête
      mesh(g, new THREE.SphereGeometry(0.2, 10, 10), M.skin, 0, 1.42, 0);
      // Cheveux
      mesh(g, new THREE.SphereGeometry(0.21, 10, 6), M.hair, 0, 1.48, -0.02);
    }

    // ── Helpers ────────────────────────────────────────────────────
    function box(parent, w, h, d, material, x, y, z) {
      const m = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), material);
      m.position.set(x, y, z);
      m.castShadow = true;
      m.receiveShadow = true;
      parent.add(m);
      return m;
    }
    function mesh(parent, geo, material, x, y, z) {
      const m = new THREE.Mesh(geo, material);
      m.position.set(x, y, z);
      m.castShadow = true;
      parent.add(m);
      return m;
    }
    function mat(color, roughness = 0.7, metalness = 0, side = THREE.FrontSide) {
      return new THREE.MeshStandardMaterial({ color, roughness, metalness, side });
    }
    function matGlass(color) {
      return new THREE.MeshStandardMaterial({ color, roughness: 0.04, metalness: 0.1, transparent: true, opacity: 0.38, emissive: 0x224488, emissiveIntensity: 0.3 });
    }
    function matMetal(color) {
      return new THREE.MeshStandardMaterial({ color, roughness: 0.25, metalness: 0.85 });
    }
    function matEmit(color, emissive, emissiveIntensity) {
      return new THREE.MeshStandardMaterial({ color, roughness: 0.6, emissive, emissiveIntensity, transparent: true, opacity: 0.88 });
    }

    } // fin initARScene
  </script>
</body>
</html>
