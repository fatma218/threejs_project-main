<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Morning Tale — AR</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #000; font-family: 'DM Sans', sans-serif; touch-action: none; }

    /* Vidéo caméra en fond */
    #cam {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 0;
    }

    /* Canvas Three.js transparent par-dessus */
    canvas {
      position: fixed !important;
      inset: 0 !important;
      z-index: 1 !important;
    }

    /* ── Écran de démarrage ── */
    #start-screen {
      position: fixed;
      inset: 0;
      background: #070510;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 22px;
      z-index: 900;
      padding: 30px;
      text-align: center;
    }
    #start-screen h1 { font-size: 26px; color: #ffd080; letter-spacing: 4px; text-transform: uppercase; }
    #start-screen p  { color: rgba(255,255,255,0.55); font-size: 14px; line-height: 1.7; max-width: 300px; }
    #start-btn {
      background: rgba(255,208,128,0.15);
      border: 1px solid #ffd080;
      color: #ffd080;
      padding: 16px 44px;
      border-radius: 40px;
      font-size: 17px;
      font-family: inherit;
      cursor: pointer;
      letter-spacing: 1px;
      margin-top: 8px;
    }
    #start-btn:active { background: rgba(255,208,128,0.3); }
    #back-start { background: none; border: none; color: rgba(255,255,255,0.35); font-size: 13px; cursor: pointer; font-family: inherit; }

    /* ── UI AR ── */
    #ar-ui { display: none; }

    #top-bar {
      position: fixed;
      top: 0; left: 0; right: 0;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      z-index: 10;
      background: linear-gradient(to bottom, rgba(7,5,16,0.7) 0%, transparent 100%);
    }
    .pill-btn {
      background: rgba(10,8,24,0.82);
      border: 1px solid rgba(255,255,255,0.2);
      color: #fff;
      padding: 9px 16px;
      border-radius: 30px;
      font-size: 13px;
      font-family: inherit;
      cursor: pointer;
    }
    #hint {
      background: rgba(10,8,24,0.82);
      border: 1px solid rgba(255,208,128,0.35);
      border-radius: 12px;
      padding: 7px 14px;
      color: #ffd080;
      font-size: 12px;
      pointer-events: none;
    }

    /* ── Boutons de contrôle ── */
    #controls {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 12px;
      z-index: 10;
    }
    .ctrl {
      width: 52px; height: 52px;
      background: rgba(10,8,24,0.82);
      border: 1px solid rgba(255,208,128,0.4);
      border-radius: 50%;
      color: #ffd080;
      font-size: 20px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    .ctrl:active { background: rgba(255,208,128,0.25); }

    /* Bouton Reset plus discret */
    #btn-reset {
      position: fixed;
      bottom: 100px;
      right: 20px;
      z-index: 10;
      font-size: 11px;
      padding: 7px 14px;
      border-radius: 20px;
      letter-spacing: 0.5px;
    }
  </style>
</head>
<body>

  <!-- Vidéo caméra -->
  <video id="cam" autoplay muted playsinline></video>

  <!-- Écran de démarrage -->
  <div id="start-screen">
    <div style="font-size:50px">🏠</div>
    <h1>Morning Tale AR</h1>
    <p>La chambre 3D s'affiche par-dessus ta caméra.<br>Fais pivoter et redimensionne avec tes doigts.</p>
    <button id="start-btn" onclick="startAR()">📷 Activer la caméra</button>
    <button id="back-start" onclick="window.location.href='index.html'">← Retour à l'histoire</button>
  </div>

  <!-- UI AR (cachée jusqu'au démarrage) -->
  <div id="ar-ui">
    <div id="top-bar">
      <button class="pill-btn" onclick="window.location.href='index.html'">← Retour</button>
      <div id="hint">Glisse pour tourner · Pince pour zoomer</div>
    </div>
    <div id="controls">
      <div class="ctrl" id="btn-smaller">➖</div>
      <div class="ctrl" id="btn-rot-l">↺</div>
      <div class="ctrl" id="btn-rot-r">↻</div>
      <div class="ctrl" id="btn-bigger">➕</div>
    </div>
    <button class="pill-btn" id="btn-reset" onclick="resetRoom()" style="background:rgba(10,8,24,0.7);border-color:rgba(255,255,255,0.2);color:rgba(255,255,255,0.6);font-size:11px;">⟳ Réinitialiser</button>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

  <script>
  // ═══════════════════════════════════════════════════════════════
  //  DÉMARRAGE — déclenché par l'utilisateur (requis pour caméra)
  // ═══════════════════════════════════════════════════════════════
  async function startAR() {
    const btn = document.getElementById('start-btn');
    btn.textContent = '⏳ Connexion caméra…';
    btn.disabled = true;

    try {
      const stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: { ideal: 'environment' }, width: { ideal: 1280 }, height: { ideal: 720 } },
        audio: false,
      });
      const video = document.getElementById('cam');
      video.srcObject = stream;
      await video.play();

      document.getElementById('start-screen').style.display = 'none';
      document.getElementById('ar-ui').style.display = 'block';
      init3D();

    } catch (err) {
      btn.textContent = '📷 Activer la caméra';
      btn.disabled = false;
      const msg = err.name === 'NotAllowedError'
        ? '❌ Permission caméra refusée.\nVa dans Paramètres → Chrome → Autorisations → Caméra.'
        : '❌ Caméra non disponible :\n' + err.message;
      alert(msg);
    }
  }

  // ═══════════════════════════════════════════════════════════════
  //  THREE.JS — scène 3D transparente sur la caméra
  // ═══════════════════════════════════════════════════════════════
  function init3D() {
    // ── Renderer transparent ──────────────────────────────────
    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setClearColor(0x000000, 0); // 0 = complètement transparent
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    document.body.appendChild(renderer.domElement);

    // ── Caméra ────────────────────────────────────────────────
    const camera = new THREE.PerspectiveCamera(55, innerWidth / innerHeight, 0.01, 60);
    camera.position.set(0, 4, 8);
    camera.lookAt(0, 1, 0);

    // ── Scene ─────────────────────────────────────────────────
    const scene = new THREE.Scene();

    // ── Lumières ──────────────────────────────────────────────
    scene.add(new THREE.AmbientLight(0x8877bb, 2.2));
    const sun = new THREE.DirectionalLight(0xffe8aa, 1.5);
    sun.position.set(3, 6, 4);
    sun.castShadow = true;
    scene.add(sun);
    const fill = new THREE.DirectionalLight(0x4466bb, 0.5);
    fill.position.set(-3, 2, -2);
    scene.add(fill);

    // ── Chambre ───────────────────────────────────────────────
    const roomGroup = new THREE.Group();
    scene.add(roomGroup);
    buildRoom(roomGroup);

    // ── État transformation ───────────────────────────────────
    let scale = 1.0;
    let rotY  = 0;
    let rotX  = 0.15; // légère inclinaison initiale

    function applyTransform() {
      roomGroup.scale.setScalar(scale);
      roomGroup.rotation.y = rotY;
      roomGroup.rotation.x = rotX;
    }
    applyTransform();

    window.resetRoom = function() {
      scale = 1.0; rotY = 0; rotX = 0.15;
      applyTransform();
    };

    // ── Boutons ───────────────────────────────────────────────
    document.getElementById('btn-bigger') .addEventListener('click', () => { scale = Math.min(scale + 0.1, 3.0); applyTransform(); });
    document.getElementById('btn-smaller').addEventListener('click', () => { scale = Math.max(scale - 0.1, 0.2); applyTransform(); });
    document.getElementById('btn-rot-l')  .addEventListener('click', () => { rotY -= Math.PI / 8; applyTransform(); });
    document.getElementById('btn-rot-r')  .addEventListener('click', () => { rotY += Math.PI / 8; applyTransform(); });

    // ── Gestes tactiles ───────────────────────────────────────
    let touches = {};
    let lastPinchDist = null;
    let lastTouchX = null, lastTouchY = null;

    renderer.domElement.addEventListener('touchstart', (e) => {
      e.preventDefault();
      Array.from(e.changedTouches).forEach(t => { touches[t.identifier] = { x: t.clientX, y: t.clientY }; });
      if (Object.keys(touches).length === 1) {
        const t = e.touches[0];
        lastTouchX = t.clientX;
        lastTouchY = t.clientY;
        lastPinchDist = null;
      }
    }, { passive: false });

    renderer.domElement.addEventListener('touchmove', (e) => {
      e.preventDefault();
      const ts = Array.from(e.touches);

      if (ts.length === 2) {
        // Pinch → zoom
        const dx = ts[0].clientX - ts[1].clientX;
        const dy = ts[0].clientY - ts[1].clientY;
        const dist = Math.sqrt(dx*dx + dy*dy);
        if (lastPinchDist !== null) {
          const delta = (dist - lastPinchDist) / 300;
          scale = Math.max(0.2, Math.min(3.0, scale + delta));
          applyTransform();
        }
        lastPinchDist = dist;
        lastTouchX = null;
      } else if (ts.length === 1 && lastTouchX !== null) {
        // 1 doigt → rotation
        const dx = ts[0].clientX - lastTouchX;
        const dy = ts[0].clientY - lastTouchY;
        rotY += dx * 0.008;
        rotX += dy * 0.008;
        rotX = Math.max(-0.5, Math.min(0.8, rotX));
        lastTouchX = ts[0].clientX;
        lastTouchY = ts[0].clientY;
        applyTransform();
      }
    }, { passive: false });

    renderer.domElement.addEventListener('touchend', (e) => {
      Array.from(e.changedTouches).forEach(t => { delete touches[t.identifier]; });
      if (Object.keys(touches).length < 2) lastPinchDist = null;
      if (Object.keys(touches).length === 0) { lastTouchX = null; lastTouchY = null; }
    });

    // ── Resize ────────────────────────────────────────────────
    window.addEventListener('resize', () => {
      camera.aspect = innerWidth / innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(innerWidth, innerHeight);
    });

    // ── Boucle ────────────────────────────────────────────────
    const lampLight = scene.getObjectByName('lampLight');
    let t = 0;
    renderer.setAnimationLoop((time) => {
      t = time * 0.001;
      if (lampLight) lampLight.intensity = 1.6 + Math.sin(t * 1.1) * 0.1;
      renderer.render(scene, camera);
    });
  }

  // ═══════════════════════════════════════════════════════════════
  //  CHAMBRE 3D
  // ═══════════════════════════════════════════════════════════════
  function buildRoom(root) {
    const W = 10, H = 3.8, D = 10;

    const M = {
      wall:  mat(0xf2e8d8, 0.9, 0, THREE.BackSide),
      floor: mat(0xd4a96a, 0.7),
      rug:   mat(0xa06050, 1.0),
      wood:  mat(0x9e7c5a, 0.6),
      ward:  mat(0x7a5535, 0.6),
      desk:  mat(0x9a7a55, 0.6),
      bed:   mat(0xc08060, 0.7),
      linen: mat(0xfff0e0, 0.9),
      couv:  mat(0xddd0bb, 0.9),
      glass: new THREE.MeshStandardMaterial({ color: 0xaaddff, roughness:0.04, metalness:0.1, transparent:true, opacity:0.38, emissive:0x224488, emissiveIntensity:0.3 }),
      metal: new THREE.MeshStandardMaterial({ color: 0xc8a060, roughness:0.25, metalness:0.85 }),
      plant: mat(0x4a8040, 0.8),
      pot:   mat(0x8b6340, 0.7),
      lamp:  new THREE.MeshStandardMaterial({ color:0xfff0cc, roughness:0.6, emissive:0xffcc66, emissiveIntensity:0.5, transparent:true, opacity:0.88 }),
      mold:  mat(0xefe0cc, 0.5),
    };

    // Sol + Murs + Plafond
    box(root, W, 0.05, D,  M.floor, 0, -0.025, 0);
    box(root, W, H,    D,  M.wall,  0, H/2, 0);
    box(root, 5.5, 0.03, 4.5, M.rug, 0, 0.015, 0.5);

    // Plinthes
    [[W,0,0,-D/2+0.04],[W,0,0,D/2-0.04]].forEach(([w,,,,z]) =>
      box(root, w, 0.1, 0.04, M.mold, 0, 0.05, z ?? 0));
    box(root, W, 0.1, 0.04, M.mold, 0, 0.05, -D/2+0.04);
    box(root, W, 0.1, 0.04, M.mold, 0, 0.05,  D/2-0.04);
    box(root, 0.04, 0.1, D, M.mold, -W/2+0.04, 0.05, 0);
    box(root, 0.04, 0.1, D, M.mold,  W/2-0.04, 0.05, 0);

    // Lit
    box(root, 2.0, 0.28, 2.2, M.bed,   -2.8, 0.14, -3.5);
    box(root, 2.0, 0.22, 2.2, M.linen, -2.8, 0.50, -3.5);
    box(root, 1.9, 0.35, 2.1, M.couv,  -2.8, 0.63, -3.5);
    box(root, 2.0, 0.5,  0.14, M.wood, -2.8, 0.55, -4.55);
    box(root, 1.7, 0.38, 0.14, M.linen,-2.8, 0.64, -4.46);

    // Table de nuit
    box(root, 0.6, 0.5, 0.55, M.wood, -1.4, 0.25, -3.2);

    // Armoire
    box(root, 0.55, 2.2, 1.5, M.ward, -4.2, 1.1, -1.0);

    // Bureau
    box(root, 1.4, 0.06, 0.7, M.desk, 2.8, 0.78, 1.5);
    [[-0.6,0.28],[0.6,0.28],[-0.6,-0.28],[0.6,-0.28]].forEach(([dx,dz]) =>
      box(root, 0.06, 0.78, 0.06, M.desk, 2.8+dx, 0.39, 1.5+dz));

    // Chaise
    box(root, 0.5, 0.04, 0.5, M.wood, 2.8, 0.5, 2.8);
    box(root, 0.5, 0.55, 0.05, M.wood, 2.8, 0.77, 3.06);

    // Plante
    box(root, 0.35, 0.32, 0.35, M.pot, 3.5, 0.16, 3.5);
    mesh(root, new THREE.SphereGeometry(0.42, 8, 6), M.plant, 3.5, 0.75, 3.5);

    // Lampe de sol
    box(root, 0.07, 1.4, 0.07, M.wood, -3.8, 0.7, 2.8);
    mesh(root, new THREE.CylinderGeometry(0.28, 0.38, 0.45, 12), M.lamp, -3.8, 1.6, 2.8);
    const lp = new THREE.PointLight(0xffaa44, 1.6, 5);
    lp.name = 'lampLight';
    lp.position.set(-3.8, 1.5, 2.8);
    root.add(lp);

    // Fenêtre
    box(root, 2.2, 0.09, 0.12, M.wood, 1.5, 3.02, -4.98);
    box(root, 2.2, 0.09, 0.12, M.wood, 1.5, 1.03, -4.98);
    box(root, 0.1, 2.05, 0.12, M.wood, 0.45, 2.02, -4.98);
    box(root, 0.1, 2.05, 0.12, M.wood, 2.55, 2.02, -4.98);
    box(root, 2.0, 1.95, 0.04, M.glass, 1.5, 2.02, -4.98);

    // Porte
    box(root, 1.0, 2.1, 0.07, mat(0xb89070, 0.65), -1.5, 1.05, 4.97);
    mesh(root, new THREE.SphereGeometry(0.05, 10, 10), M.metal, -1.12, 1.05, 4.93);

    // Miroir
    const mg = new THREE.Group();
    mg.position.set(4.94, 1.9, -1.0);
    mg.rotation.y = -Math.PI / 2;
    box(mg, 1.1, 1.5, 0.08, M.wood, 0, 0, 0);
    box(mg, 0.98, 1.36, 0.02, new THREE.MeshStandardMaterial({ color:0xddeeff, roughness:0.01, metalness:0.98 }), 0, 0, 0.045);
    root.add(mg);

    // Personnage
    buildCharacter(root, 0, 0, 0.5);
  }

  function buildCharacter(root, x, y, z) {
    const g = new THREE.Group();
    g.position.set(x, y, z);
    root.add(g);
    const skin  = mat(0xffcc99, 0.5);
    const shirt = mat(0x5577cc, 0.7);
    const pants = mat(0x334466, 0.7);
    const hair  = mat(0x3a2510, 0.8);
    const shoe  = mat(0x222222, 0.8);
    // Jambes + chaussures
    box(g, 0.16, 0.52, 0.16, pants, -0.12, 0.26, 0);
    box(g, 0.16, 0.52, 0.16, pants,  0.12, 0.26, 0);
    box(g, 0.17, 0.08, 0.22, shoe,  -0.12, 0.04, 0.03);
    box(g, 0.17, 0.08, 0.22, shoe,   0.12, 0.04, 0.03);
    // Corps + bras
    box(g, 0.42, 0.6, 0.24, shirt, 0, 0.82, 0);
    box(g, 0.14, 0.48, 0.14, shirt, -0.3, 0.82, 0);
    box(g, 0.14, 0.48, 0.14, shirt,  0.3, 0.82, 0);
    mesh(g, new THREE.SphereGeometry(0.09, 7, 7), skin, -0.3, 0.55, 0);
    mesh(g, new THREE.SphereGeometry(0.09, 7, 7), skin,  0.3, 0.55, 0);
    // Cou + tête
    box(g, 0.14, 0.14, 0.14, skin, 0, 1.17, 0);
    mesh(g, new THREE.SphereGeometry(0.2, 10, 10), skin, 0, 1.42, 0);
    mesh(g, new THREE.SphereGeometry(0.21, 8, 6),  hair, 0, 1.48, -0.02);
  }

  function box(parent, w, h, d, material, x, y, z) {
    const m = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), material);
    m.position.set(x, y, z);
    m.castShadow = true;
    m.receiveShadow = true;
    parent.add(m);
    return m;
  }
  function mesh(parent, geo, material, x, y, z) {
    const m = new THREE.Mesh(geo, material);
    m.position.set(x, y, z);
    m.castShadow = true;
    parent.add(m);
    return m;
  }
  function mat(color, roughness = 0.7, metalness = 0, side = THREE.FrontSide) {
    return new THREE.MeshStandardMaterial({ color, roughness, metalness, side });
  }
  </script>
</body>
</html>
